name: Deploy Production

on:
  workflow_dispatch:

env:
  DEPLOY_DIR: /opt/nnews
  BRANCH: main

jobs:
  checkout:
    name: Clone or Update Repository
    runs-on: ubuntu-latest
    steps:
    - name: Clone or update repository via SSH
      uses: appleboy/ssh-action@v1
      with:
        host: ${{ secrets.PROD_SSH_HOST }}
        username: ${{ secrets.PROD_SSH_USER }}
        password: ${{ secrets.PROD_SSH_PASSWORD }}
        port: ${{ secrets.PROD_SSH_PORT || 22 }}
        script: |
          set -e
          DEPLOY_DIR="/opt/nnews"
          REPO_URL="https://github.com/${{ github.repository }}.git"
          BRANCH="main"

          if [ -d "$DEPLOY_DIR" ]; then
            echo "Updating existing repository..."
            cd "$DEPLOY_DIR"
            git fetch origin
            git reset --hard "origin/$BRANCH"
            git clean -fd
          else
            echo "Cloning repository..."
            git clone --branch "$BRANCH" --single-branch "$REPO_URL" "$DEPLOY_DIR"
          fi

  inject-env:
    name: Inject Environment Variables
    runs-on: ubuntu-latest
    needs: checkout
    steps:
    - name: Write .env.prod via SSH
      uses: appleboy/ssh-action@v1
      with:
        host: ${{ secrets.PROD_SSH_HOST }}
        username: ${{ secrets.PROD_SSH_USER }}
        password: ${{ secrets.PROD_SSH_PASSWORD }}
        port: ${{ secrets.PROD_SSH_PORT || 22 }}
        script: |
          set -e
          cat > /opt/nnews/.env.prod <<'ENVEOF'
          CERTIFICATE_PASSWORD=${{ secrets.CERTIFICATE_PASSWORD }}
          EMAGINE_CONNECTION_STRING=${{ secrets.EMAGINE_CONNECTION_STRING }}
          EMAGINE_JWT_SECRET=${{ secrets.EMAGINE_JWT_SECRET }}
          DEVBLOG_CONNECTION_STRING=${{ secrets.DEVBLOG_CONNECTION_STRING }}
          DEVBLOG_JWT_SECRET=${{ secrets.DEVBLOG_JWT_SECRET }}
          ENVEOF

          sed -i 's/^[[:space:]]*//' /opt/nnews/.env.prod

  setup-network:
    name: Create Docker Network
    runs-on: ubuntu-latest
    needs: inject-env
    steps:
    - name: Ensure docker network exists via SSH
      uses: appleboy/ssh-action@v1
      with:
        host: ${{ secrets.PROD_SSH_HOST }}
        username: ${{ secrets.PROD_SSH_USER }}
        password: ${{ secrets.PROD_SSH_PASSWORD }}
        port: ${{ secrets.PROD_SSH_PORT || 22 }}
        script: |
          set -e
          docker network inspect emagine-network >/dev/null 2>&1 || docker network create emagine-network

  stop-services:
    name: Stop Current Services
    runs-on: ubuntu-latest
    needs: setup-network
    steps:
    - name: Docker compose down via SSH
      uses: appleboy/ssh-action@v1
      with:
        host: ${{ secrets.PROD_SSH_HOST }}
        username: ${{ secrets.PROD_SSH_USER }}
        password: ${{ secrets.PROD_SSH_PASSWORD }}
        port: ${{ secrets.PROD_SSH_PORT || 22 }}
        script: |
          set -e
          cd /opt/nnews
          docker compose --env-file .env.prod -f docker-compose-prod.yml down

  deploy-services:
    name: Build and Start Services
    runs-on: ubuntu-latest
    needs: stop-services
    steps:
    - name: Docker compose up via SSH
      uses: appleboy/ssh-action@v1
      with:
        host: ${{ secrets.PROD_SSH_HOST }}
        username: ${{ secrets.PROD_SSH_USER }}
        password: ${{ secrets.PROD_SSH_PASSWORD }}
        port: ${{ secrets.PROD_SSH_PORT || 22 }}
        command_timeout: 60m
        script: |
          set -e
          cd /opt/nnews
          docker compose --env-file .env.prod -f docker-compose-prod.yml up --build -d

  verify:
    name: Verify Deployment
    runs-on: ubuntu-latest
    needs: deploy-services
    steps:
    - name: Check services via SSH
      uses: appleboy/ssh-action@v1
      with:
        host: ${{ secrets.PROD_SSH_HOST }}
        username: ${{ secrets.PROD_SSH_USER }}
        password: ${{ secrets.PROD_SSH_PASSWORD }}
        port: ${{ secrets.PROD_SSH_PORT || 22 }}
        script: |
          set -e
          echo "Waiting for services to start..."
          sleep 10
          cd /opt/nnews
          docker compose --env-file .env.prod -f docker-compose-prod.yml ps
          echo "Deployment completed successfully."

  cleanup:
    name: Cleanup Docker Resources
    runs-on: ubuntu-latest
    needs: verify
    steps:
    - name: Prune unused Docker resources via SSH
      uses: appleboy/ssh-action@v1
      with:
        host: ${{ secrets.PROD_SSH_HOST }}
        username: ${{ secrets.PROD_SSH_USER }}
        password: ${{ secrets.PROD_SSH_PASSWORD }}
        port: ${{ secrets.PROD_SSH_PORT || 22 }}
        script: |
          set -e
          echo "Cleaning up unused Docker resources..."
          docker system prune -af --volumes
          echo "Cleanup completed."

  summary:
    name: Deployment Summary
    runs-on: ubuntu-latest
    needs: cleanup
    steps:
    - name: Write summary
      run: |
        echo "## Production Deployment" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "- Server: \`${{ secrets.PROD_SSH_HOST }}\`" >> $GITHUB_STEP_SUMMARY
        echo "- Branch: \`main\`" >> $GITHUB_STEP_SUMMARY
        echo "- Commit: \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
        echo "- Triggered by: \`${{ github.event_name }}\`" >> $GITHUB_STEP_SUMMARY
